<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Add Account</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><div class="layout"><aside class="sidebar"><div class="brand">DevPlay Studio</div><div class="tagline">إضافة / تعديل حساب</div><nav class="nav"><a href="dashboard.html">الإحصائيات</a><a href="accounts.html">الحسابات</a><a class="active" href="add-account.html">إضافة حساب</a><a href="policies.html">السياسات</a><a href="sale-document.html">توثيق البيع</a><a href="#" data-logout>خروج</a></nav></aside><main class="main"><div class="topbar"><h1 class="title" id="pageTitle">إضافة حساب جديد</h1></div><form id="accountForm" class="card"><div class="form-grid"><div class="field"><label>اللعبة</label><input name="game" required></div><div class="field"><label>اسم الحساب</label><input name="account_name" required></div><div class="field"><label>ID الحساب</label><input name="account_id"></div><div class="field"><label>السيرفر</label><input name="server"></div><div class="field"><label>تكلفة الشراء</label><input name="purchase_cost" type="number" step="0.01" value="0"></div><div class="field"><label>سعر البيع</label><input name="sell_price" type="number" step="0.01" value="0"></div><div class="field"><label>رقم واتساب البائع</label><input name="seller_whatsapp" placeholder="010xxxxxxx"></div><div class="field"><label>الحالة</label><select name="status"><option value="available">متاح</option><option value="reserved">محجوز</option><option value="sold">تم البيع</option></select></div><div class="field" style="grid-column:1/-1"><label>الوصف</label><textarea name="description"></textarea></div><div class="field" style="grid-column:1/-1"><label>ملاحظات داخلية</label><textarea name="internal_notes"></textarea></div><div class="field" style="grid-column:1/-1"><label>صور الحساب</label><input id="images" type="file" accept="image/*" multiple><div id="preview" class="images-preview"></div></div></div><div class="actions" style="margin-top:16px"><button class="btn" type="submit">حفظ الحساب</button><a class="btn secondary" href="accounts.html">رجوع</a></div><p id="msg" class="message"></p></form></main></div><script src="js/supabase.js"></script><script src="js/auth.js"></script><script src="js/accounts.js"></script></body></html>
