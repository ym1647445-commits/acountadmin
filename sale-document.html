<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sale Document</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script></head><body><div class="layout"><aside class="sidebar"><div class="brand">DevPlay Studio</div><div class="tagline">توثيق بيع الحساب</div><nav class="nav"><a href="dashboard.html">الإحصائيات</a><a href="accounts.html">الحسابات</a><a data-hide-viewer href="add-account.html">إضافة حساب</a><a href="policies.html">السياسات</a><a class="active" href="sale-document.html">توثيق البيع</a><a href="#" data-logout>خروج</a></nav></aside><main class="main"><div class="topbar"><h1 class="title">توثيق بيع الحساب</h1></div><form id="docForm" class="card"><div class="form-grid"><div class="field"><label>اسم البائع</label><input name="seller_name" required></div><div class="field"><label>رقم البطاقة</label><input name="national_id"></div><div class="field"><label>اللعبة</label><input name="game"></div><div class="field"><label>ID الحساب</label><input name="account_game_id"></div><div class="field"><label>سعر البيع</label><input name="sale_price" type="number" step="0.01"></div><div class="field"><label>التوقيع الإلكتروني</label><input name="electronic_signature" placeholder="اكتب اسم البائع كتوقيع"></div><div class="field"><label>صورة البطاقة</label><input id="idCard" type="file" accept="image/*"></div><div class="field"><label>صورة البائع بالبطاقة</label><input id="sellerCard" type="file" accept="image/*"></div><div class="field" style="grid-column:1/-1"><label>إقرار البيع</label><textarea name="declaration">أقر أنا البائع بأن الحساب ملكي بالكامل، وأنني قمت ببيعه إلى DevPlay Studio بالسعر الموضح، وأتعهد بعدم محاولة استرجاع الحساب أو تغيير بياناته بعد البيع.</textarea></div></div><div class="actions" style="margin-top:16px"><button class="btn" type="submit">حفظ التوثيق</button><button class="btn secondary" type="button" id="printBtn">طباعة</button><button class="btn secondary" type="button" id="pdfBtn">حفظ PDF على الجهاز</button></div><p id="msg" class="message"></p></form><section id="printArea" class="card" style="margin-top:16px"><h2>إقرار بيع حساب ألعاب</h2><p>DevPlay Studio - كل خدماتك الرقمية في مكان واحد.</p><div id="docPreview"></div></section></main></div><script src="js/supabase.js"></script><script src="js/auth.js"></script><script src="js/sale-document.js"></script></body></html>
